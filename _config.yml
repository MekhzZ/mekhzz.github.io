# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Mekhma Tamang | Portfolio
email: mekhmanju@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Mekhma Tamang's personal portfolio website showcasing data projects, experiences, and achievements in the field of data science. Explore a collection of projects, insights, and accomplishments that highlight Mekhma's expertise and passion for data-driven solutions.
# twitter_username: username
# github_username: username
minimal_mistakes_skin: default
search: false

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  # - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Mekhma Tamang"
  avatar : "/assets/images/bio-photo.png"
  bio    : ""
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:mekhmanju@gmail.com"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/mekhma_"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MekhzZ"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/mekhz.hevc"

collections:
  projects:
    output: true
    permalink: /projects/:path/
  experience:
    output: true
    permalink: /experience/:path/
  extras:
    output: true
    permalink: /extras/:path/
  education:
      output: true
      permalink: /education/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: experience
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: education
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: extras
    values:
      layout: single
      author_profile: true

